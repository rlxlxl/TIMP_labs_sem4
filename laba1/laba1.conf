<VirtualHost *:4289>
    ServerName localhost
    ServerAdmin webmaster@localhost
    
    # DocumentRoot - папка со сборкой React
    DocumentRoot /var/www/laba1/build
    
    <Directory /var/www/laba1/build>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        
        # Для React Router - все запросы перенаправлять на index.html
        <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /
            RewriteRule ^index\.html$ - [L]
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule . /index.html [L]
        </IfModule>
    </Directory>
    
    # Проксирование API запросов на json-server
    ProxyPreserveHost On
    ProxyPass /api http://localhost:8080
    ProxyPassReverse /api http://localhost:8080
    
    # Логи
    ErrorLog ${APACHE_LOG_DIR}/laba1_error.log
    CustomLog ${APACHE_LOG_DIR}/laba1_access.log combined
</VirtualHost>
