services:
  frontend:
    build:
      context: .
      args:
        REACT_APP_API_URL: http://api:8080
    ports:
      - "3000:80"
    restart: unless-stopped
    networks:
      - app-network

  # JSON Server для API
  api:
    image: node:18-alpine
    ports:
      - "8080:8080"
    volumes:
      - ./db.json:/app/db.json
    working_dir: /app
    command: sh -c "npm install -g json-server && json-server --watch db.json --host 0.0.0.0 --port 8080"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
